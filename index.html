<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時匯率換算 (Converter Neo)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 防止在手機上點擊時出現預設的藍色反白框 */
            -webkit-tap-highlight-color: transparent; 
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 防止手機網頁下拉刷新產生空白 */
            overscroll-behavior-y: none; 
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #000000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .timestamp {
            font-size: 0.8rem;
            color: #4CAF50;
        }
        .currency-row {
            display: flex;
            align-items: center;
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        /* 貨幣列點擊時的微縮放反饋 */
        .currency-row:active {
            transform: scale(0.98);
            opacity: 0.8;
        }
        .currency-row.active {
            background-color: #3d3d29;
            border: 1px solid #7a6021;
        }
        .currency-row.active .amount {
            color: #f7b731;
        }
        .flag {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 1.2rem;
            overflow: hidden;
        }
        .code {
            font-size: 1.1rem;
            font-weight: 500;
            flex-grow: 1;
        }
        .amount {
            font-size: 1.2rem;
            text-align: right;
            border: none;
            background: transparent;
            color: #ffffff;
            width: 60%;
            outline: none;
        }
        /* 鍵盤區塊 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1.5rem;
            padding: 15px 0;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s ease, background-color 0.1s;
        }
        /* 數字鍵盤按壓時的顏色變化與實體按壓感 */
        .btn:active {
            background-color: #555555;
            transform: scale(0.92);
        }
        .btn.operator {
            background-color: #ff9f0a;
            color: white;
        }
        .btn.operator:active {
            background-color: #cc7f08;
            transform: scale(0.92);
        }
        .btn.action {
            background-color: #a5a5a5;
            color: #000;
        }
        .btn.action:active {
            background-color: #888888;
            transform: scale(0.92);
        }
        .btn.zero {
            grid-column: span 2;
            border-radius: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="title">Converter Neo</div>
            <div class="timestamp" id="last-update">正在獲取最新匯率...</div>
        </div>
    </div>

    <div id="currency-list">
        </div>

    <div class="keypad">
        <button class="btn action" onclick="handleInput('C')">C</button>
        <button class="btn action" onclick="handleInput('BACK')">←</button>
        <button class="btn action" onclick="handleInput('%')">%</button>
        <button class="btn operator" onclick="handleInput('/')">÷</button>

        <button class="btn" onclick="handleInput('7')">7</button>
        <button class="btn" onclick="handleInput('8')">8</button>
        <button class="btn" onclick="handleInput('9')">9</button>
        <button class="btn operator" onclick="handleInput('*')">×</button>

        <button class="btn" onclick="handleInput('4')">4</button>
        <button class="btn" onclick="handleInput('5')">5</button>
        <button class="btn" onclick="handleInput('6')">6</button>
        <button class="btn operator" onclick="handleInput('-')">-</button>

        <button class="btn" onclick="handleInput('1')">1</button>
        <button class="btn" onclick="handleInput('2')">2</button>
        <button class="btn" onclick="handleInput('3')">3</button>
        <button class="btn operator" onclick="handleInput('+')">+</button>

        <button class="btn zero" onclick="handleInput('0')">0</button>
        <button class="btn" onclick="handleInput('.')">.</button>
        <button class="btn operator" onclick="handleInput('=')">=</button>
    </div>
</div>

<script>
    // 預設五種支援的貨幣
    const currencies = [
        { code: 'JPY', flag: '🇯🇵' },
        { code: 'TWD', flag: '🇹🇼' },
        { code: 'KRW', flag: '🇰🇷' },
        { code: 'CNY', flag: '🇨🇳' },
        { code: 'USD', flag: '🇺🇸' }
    ];

    let exchangeRates = {};
    let activeCurrency = 'USD';
    let currentInput = '10';

    // 初始化
    async function init() {
        renderCurrencies();
        await fetchRates();
        updateDisplay();
    }

    // 抓取即時匯率資料
    async function fetchRates() {
        try {
            // 資料來源：ExchangeRate-API 免費公開端點
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            
            if (data && data.rates) {
                exchangeRates = data.rates;
                
                // 將 UNIX 時間戳記轉換為台灣本地時間格式
                const updateTime = new Date(data.time_last_update_unix * 1000);
                document.getElementById('last-update').innerText = 
                    `${updateTime.getFullYear()}/${(updateTime.getMonth()+1).toString().padStart(2, '0')}/${updateTime.getDate().toString().padStart(2, '0')} ${updateTime.getHours().toString().padStart(2, '0')}:${updateTime.getMinutes().toString().padStart(2, '0')} 更新`;
            }
        } catch (error) {
            console.error("無法取得匯率資料:", error);
            document.getElementById('last-update').innerText = "匯率更新失敗，請檢查網路狀態";
            document.getElementById('last-update').style.color = "#ff453a";
        }
    }

    // 渲染貨幣列表
    function renderCurrencies() {
        const listDiv = document.getElementById('currency-list');
        listDiv.innerHTML = '';

        currencies.forEach(currency => {
            const row = document.createElement('div');
            row.className = `currency-row ${currency.code === activeCurrency ? 'active' : ''}`;
            row.onclick = () => setActiveCurrency(currency.code);

            row.innerHTML = `
                <div class="flag">${currency.flag}</div>
                <div class="code">${currency.code}</div>
                <div class="amount" id="amount-${currency.code}">0</div>
            `;
            listDiv.appendChild(row);
        });
    }

    // 設定當前基準貨幣
    function setActiveCurrency(code) {
        activeCurrency = code;
        currentInput = document.getElementById(`amount-${code}`).innerText.replace(/,/g, '');
        renderCurrencies();
        updateDisplay();
    }

    // 處理鍵盤輸入
    function handleInput(key) {
        if (key === 'C') {
            currentInput = '0';
        } else if (key === 'BACK') {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
        } else if (key === '=') {
            try {
                let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                // 簡單計算功能
                const result = new Function('return ' + expression)();
                currentInput = String(result);
            } catch (e) {
                currentInput = 'Error';
            }
        } else if (['+', '-', '*', '/', '%'].includes(key)) {
            const lastChar = currentInput.slice(-1);
            if (!['+', '-', '*', '/', '%', '.'].includes(lastChar)) {
                 currentInput += key === '*' ? '×' : key === '/' ? '÷' : key;
            }
        } else {
            if (currentInput === '0' && key !== '.') {
                currentInput = key;
            } else {
                currentInput += key;
            }
        }
        updateDisplay();
    }

    // 交叉換算邏輯與畫面更新
    function updateDisplay() {
        const activeValue = parseFloat(currentInput);
        
        currencies.forEach(currency => {
            const amountEl = document.getElementById(`amount-${currency.code}`);
            
            if (currency.code === activeCurrency) {
                amountEl.innerText = currentInput;
            } else {
                if (isNaN(activeValue) || !exchangeRates[currency.code] || !exchangeRates[activeCurrency]) {
                    amountEl.innerText = '0';
                    return;
                }
                // 核心算法：目標匯率 / 基準匯率 * 輸入金額
                const rateToUSD = exchangeRates[currency.code];
                const activeToUSD = exchangeRates[activeCurrency];
                const calculatedValue = (rateToUSD / activeToUSD) * activeValue;
                
                amountEl.innerText = formatNumber(calculatedValue);
            }
        });
    }

    // 數字格式化 (加入千分位與控制小數點)
    function formatNumber(num) {
        return num.toLocaleString('en-US', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        });
    }

    // 啟動程式
    init();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時匯率換算 Neo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overscroll-behavior-y: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: #000000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100vh;
            justify-content: flex-end;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .title { font-size: 1.2rem; font-weight: bold; }
        .timestamp { font-size: 0.8rem; color: #4CAF50; }

        .currency-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
        }

        .currency-row {
            display: flex;
            align-items: center;
            background-color: #1C1C1E;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: background-color 0.1s, border 0.1s;
            border: 1px solid transparent;
        }

        .currency-row.active {
            background-color: #2c2c2e;
            border: 1px solid #7a6021;
        }
        
        .currency-row.active .amount { color: #f7b731; }

        .currency-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 0;
            flex-shrink: 0;
        }

        .flag-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            border: 1px solid #333;
        }

        .code-and-name { display: flex; flex-direction: column; }
        .code { font-size: 1.1rem; font-weight: 500; }
        .name { font-size: 0.8rem; color: #888; }

        .amount-container {
            flex-grow: 1;
            text-align: right;
            padding-left: 15px;
        }

        .amount {
            font-size: 1.3rem;
            border: none;
            background: transparent;
            color: #ffffff;
            width: 100%;
            text-align: right;
            outline: none;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            background-color: #3A3A3C;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1.5rem;
            padding: 15px 0;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s;
        }

        .btn:active { background-color: #555; }
        .btn.operator { background-color: #FF9F0A; color: white; }
        .btn.operator:active { background-color: #cc7f08; }
        .btn.action { background-color: #a5a5a5; color: #000; }
        .btn.action:active { background-color: #888; }
        .btn.zero { grid-column: span 2; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-content {
            background-color: #1c1c1e;
            width: 80%;
            max-width: 300px;
            max-height: 80vh;
            border-radius: 20px;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #333;
        }

        .modal-header {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .currency-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            transition: background-color 0.1s;
        }

        .currency-option:hover { background-color: #333; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="title">Converter Neo</div>
            <div class="timestamp" id="last-update">正在獲取數據...</div>
        </div>
    </div>

    <div class="currency-list" id="currencyList"></div>

    <div class="keypad">
        <button class="btn action" onclick="handleInput('C')">C</button>
        <button class="btn action" onclick="handleInput('delete')">←</button>
        <button class="btn action" onclick="handleInput('%')">%</button>
        <button class="btn operator" onclick="handleInput('/')">÷</button>

        <button class="btn" onclick="handleInput('7')">7</button>
        <button class="btn" onclick="handleInput('8')">8</button>
        <button class="btn" onclick="handleInput('9')">9</button>
        <button class="btn operator" onclick="handleInput('*')">×</button>

        <button class="btn" onclick="handleInput('4')">4</button>
        <button class="btn" onclick="handleInput('5')">5</button>
        <button class="btn" onclick="handleInput('6')">6</button>
        <button class="btn operator" onclick="handleInput('-')">-</button>

        <button class="btn" onclick="handleInput('1')">1</button>
        <button class="btn" onclick="handleInput('2')">2</button>
        <button class="btn" onclick="handleInput('3')">3</button>
        <button class="btn operator" onclick="handleInput('+')">+</button>

        <button class="btn zero" onclick="handleInput('0')">0</button>
        <button class="btn" onclick="handleInput('.')">.</button>
        <button class="btn operator" onclick="handleInput('=')">=</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent">
        <div class="modal-header">選擇貨幣</div>
    </div>
</div>

<script>
    const allCurrencies = {
        'USD': { flag: '🇺🇸', name: '美金' },
        'TWD': { flag: '🇹🇼', name: '新台幣' },
        'JPY': { flag: '🇯🇵', name: '日圓' },
        'KRW': { flag: '🇰🇷', name: '韓圓' },
        'CNY': { flag: '🇨🇳', name: '人民幣' },
        'EUR': { flag: '🇪🇺', name: '歐元' },
        'GBP': { flag: '🇬🇧', name: '英鎊' },
        'AUD': { flag: '🇦🇺', name: '澳幣' },
        'HKD': { flag: '🇭🇰', name: '港幣' },
        'SGD': { flag: '🇸🇬', name: '新加坡幣' }
    };

    let displaySlots = ['JPY', 'TWD', 'KRW', 'CNY', 'USD'];
    let exchangeRates = {};
    let lastUpdatedTime = null;
    let activeSlotIndex = 1; 
    let currentInputString = "1"; 

    async function init() {
        renderSlots();
        await fetchExchangeRates(); 
        updateAllCalculations(); 
    }

    async function fetchExchangeRates() {
        try {
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            
            if (data && data.rates) {
                exchangeRates = data.rates;
                lastUpdatedTime = new Date(data.time_last_update_unix * 1000);
                updateTimestampDisplay();
            }
        } catch (error) {
            console.error("無法抓取實時匯率數據:", error);
            document.getElementById('last-update').innerText = "匯率載入失敗 (離線模式)";
            document.getElementById('last-update').style.color = "#ff453a";
        }
    }

    function updateTimestampDisplay() {
        if (!lastUpdatedTime) return;
        const timeStr = lastUpdatedTime.getFullYear() + '/' + 
                        (lastUpdatedTime.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                        lastUpdatedTime.getDate().toString().padStart(2, '0') + ' ' + 
                        lastUpdatedTime.getHours().toString().padStart(2, '0') + ':' + 
                        lastUpdatedTime.getMinutes().toString().padStart(2, '0');
        document.getElementById('last-update').innerText = timeStr + ' 更新';
    }

    function renderSlots() {
        const listContainer = document.getElementById('currencyList');
        listContainer.innerHTML = ''; 

        displaySlots.forEach((code, index) => {
            const currencyData = allCurrencies[code];
            
            const rowDiv = document.createElement('div');
            rowDiv.className = `currency-row ${index === activeSlotIndex ? 'active' : ''}`;
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'currency-meta';
            metaDiv.innerHTML = `
                <div class="flag-icon">${currencyData.flag}</div>
                <div class="code-and-name">
                    <span class="code">${code}</span>
                    <span class="name">${currencyData.name}</span>
                </div>
            `;
            metaDiv.onclick = (e) => { e.stopPropagation(); openModal(index); };

            // 修正：這兩行原本有語法錯誤，已經修復
            const amountContainer = document.createElement('div');
            amountContainer.className = 'amount-container';
            
            const amountInput = document.createElement('input');
            amountInput.className = 'amount';
            amountInput.type = 'text';
            amountInput.value = '0';
            amountInput.readOnly = true; 
            amountInput.id = `slot-amount-${index}`;
            
            amountContainer.appendChild(amountInput);
            
            rowDiv.appendChild(metaDiv);
            rowDiv.appendChild(amountContainer);
            
            rowDiv.onclick = () => setActiveSlot(index);
            
            listContainer.appendChild(rowDiv);
        });
    }

    function setActiveSlot(index) {
        if (index === activeSlotIndex) return;
        
        activeSlotIndex = index;
        const activeInput = document.getElementById(`slot-amount-${index}`);
        currentInputString = activeInput.value.replace(/,/g, ''); 

        renderSlots(); 
    }

    function updateAllCalculations() {
        const baseSlotIndex = activeSlotIndex;
        const baseAmount = parseFloat(currentInputString) || 0;
        const baseCode = displaySlots[baseSlotIndex];
        
        if (!exchangeRates[baseCode]) {
             displaySlots.forEach((code, index) => {
                document.getElementById(`slot-amount-${index}`).value = index === activeSlotIndex ? currentInputString : '0';
            });
            return;
        }

        const baseRateToUSD = exchangeRates[baseCode]; 

        displaySlots.forEach((targetCode, index) => {
            const amountElement = document.getElementById(`slot-amount-${index}`);
            
            if (index === baseSlotIndex) {
                amountElement.value = formatInputNumber(currentInputString);
            } else {
                const targetRateToUSD = exchangeRates[targetCode]; 
                
                if (targetRateToUSD) {
                    const convertedAmount = (baseAmount / baseRateToUSD) * targetRateToUSD;
                    amountElement.value = formatOutputNumber(convertedAmount, targetCode);
                } else {
                    amountElement.value = "0"; 
                }
            }
        });
    }

    function formatOutputNumber(num, code) {
        let fractionalDigits = 2;
        if (code === 'JPY' || code === 'KRW') fractionalDigits = 0;
        
        return num.toLocaleString('en-US', {
            minimumFractionDigits: fractionalDigits,
            maximumFractionDigits: fractionalDigits
        });
    }
    
    function formatInputNumber(numStr) {
        if (numStr === "") return "0";
        if (numStr.endsWith('.')) {
            const parts = numStr.split('.');
            return (parseFloat(parts[0]) || 0).toLocaleString('en-US') + '.';
        }
        return (parseFloat(numStr) || 0).toLocaleString('en-US');
    }

    function handleInput(key) {
        if (key === 'C') {
            currentInputString = "0";
        } else if (key === 'delete') {
            currentInputString = currentInputString.length > 1 ? currentInputString.slice(0, -1) : "0";
        } else if (key === '.') {
            if (!currentInputString.includes('.')) {
                currentInputString += ".";
            }
        } else if (/[0-9]/.test(key)) {
            if (currentInputString === "0") {
                currentInputString = key;
            } else {
                currentInputString += key;
            }
        } else if (key === '=') {
            // 保留給未來計算機擴充功能
        }
        
        updateAllCalculations(); 
    }

    let currentChangingSlotIndex = null;

    function openModal(index) {
        currentChangingSlotIndex = index;
        const modalOverlay = document.getElementById('modalOverlay');
        
        const modalContent = document.getElementById('modalContent');
        const header = modalContent.querySelector('.modal-header');
        modalContent.innerHTML = '';
        modalContent.appendChild(header);

        for (const [code, info] of Object.entries(allCurrencies)) {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'currency-option';
            optionDiv.innerHTML = `
                <div class="flag-icon">${info.flag}</div>
                <div class="code-and-name">
                    <span class="code">${code}</span>
                    <span class="name">${info.name}</span>
                </div>
            `;
            optionDiv.onclick = () => selectNewCurrency(code);
            modalContent.appendChild(optionDiv);
        }
        
        modalOverlay.classList.add('show');
    }

    function closeModal(e) {
        if (!e || e.target === document.getElementById('modalOverlay')) {
             document.getElementById('modalOverlay').classList.remove('show');
             currentChangingSlotIndex = null;
        }
    }

    function selectNewCurrency(newCode) {
        if (currentChangingSlotIndex === null) return;
        
        displaySlots[currentChangingSlotIndex] = newCode;
        
        if (currentChangingSlotIndex === activeSlotIndex) {
            currentInputString = "1";
        }
        
        renderSlots(); 
        updateAllCalculations(); 
        closeModal(); 
    }

    init();

</script>

</body>
</html>

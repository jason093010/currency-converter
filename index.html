<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時匯率換算 (Converter Neo)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overscroll-behavior-y: none; 
            position: relative;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #000000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100vh;
            justify-content: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .timestamp {
            font-size: 0.8rem;
            color: #4CAF50;
        }
        .currency-row {
            display: flex;
            align-items: center;
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.1s ease;
        }
        .currency-row.active {
            background-color: #3d3d29;
            border: 1px solid #7a6021;
        }
        .currency-row.active .amount {
            color: #f7b731;
        }
        /* 左側：選擇貨幣區塊 */
        .currency-selector {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
        }
        .currency-selector:active {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }
        .flag {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            font-size: 1.2rem;
        }
        .code {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .dropdown-icon {
            font-size: 0.7rem;
            margin-left: 5px;
            color: #888;
        }
        /* 右側：數字顯示區塊 */
        .amount-container {
            flex-grow: 1;
            display: flex;
            justify-content: flex-end;
            padding-left: 10px;
            cursor: pointer;
        }
        .amount {
            font-size: 1.3rem;
            text-align: right;
            color: #ffffff;
            word-break: break-all;
        }
        
        /* 鍵盤區塊 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1.5rem;
            padding: 15px 0;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s ease, background-color 0.1s;
        }
        .btn:active {
            background-color: #555555;
            transform: scale(0.92);
        }
        .btn.operator { background-color: #ff9f0a; color: white; }
        .btn.operator:active { background-color: #cc7f08; transform: scale(0.92); }
        .btn.action { background-color: #a5a5a5; color: #000; }
        .btn.action:active { background-color: #888888; transform: scale(0.92); }
        .btn.zero { grid-column: span 2; border-radius: 25px; }

        /* 彈出選單 (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: #1c1c1e;
            width: 100%;
            max-width: 400px;
            height: 60vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .close-btn {
            background: none; border: none; color: #0a84ff; font-size: 1rem; cursor: pointer;
        }
        .currency-list-container {
            overflow-y: auto;
            flex-grow: 1;
        }
        .modal-currency-item {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid #2c2c2e;
            cursor: pointer;
        }
        .modal-currency-item:active {
            background-color: #333;
        }
        .modal-currency-name {
            margin-left: 15px;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="title">Converter Neo</div>
            <div class="timestamp" id="last-update">正在獲取最新匯率...</div>
        </div>
    </div>

    <div id="currency-list"></div>

    <div class="keypad">
        <button class="btn action" onclick="handleInput('C')">C</button>
        <button class="btn action" onclick="handleInput('BACK')">←</button>
        <button class="btn action" onclick="handleInput('%')">%</button>
        <button class="btn operator" onclick="handleInput('/')">÷</button>

        <button class="btn" onclick="handleInput('7')">7</button>
        <button class="btn" onclick="handleInput('8')">8</button>
        <button class="btn" onclick="handleInput('9')">9</button>
        <button class="btn operator" onclick="handleInput('*')">×</button>

        <button class="btn" onclick="handleInput('4')">4</button>
        <button class="btn" onclick="handleInput('5')">5</button>
        <button class="btn" onclick="handleInput('6')">6</button>
        <button class="btn operator" onclick="handleInput('-')">-</button>

        <button class="btn" onclick="handleInput('1')">1</button>
        <button class="btn" onclick="handleInput('2')">2</button>
        <button class="btn" onclick="handleInput('3')">3</button>
        <button class="btn operator" onclick="handleInput('+')">+</button>

        <button class="btn zero" onclick="handleInput('0')">0</button>
        <button class="btn" onclick="handleInput('.')">.</button>
        <button class="btn operator" onclick="handleInput('=')">=</button>
    </div>
</div>

<div class="modal-overlay" id="currency-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>選擇貨幣</h3>
            <button class="close-btn" onclick="closeModal()">取消</button>
        </div>
        <div class="currency-list-container" id="modal-currency-list">
            </div>
    </div>
</div>

<script>
    // 完整的貨幣資料庫 (可自行擴充)
    const allCurrencies = {
        'USD': { flag: '🇺🇸', name: '美金 (US Dollar)' },
        'TWD': { flag: '🇹🇼', name: '新台幣 (New Taiwan Dollar)' },
        'JPY': { flag: '🇯🇵', name: '日圓 (Japanese Yen)' },
        'EUR': { flag: '🇪🇺', name: '歐元 (Euro)' },
        'KRW': { flag: '🇰🇷', name: '韓元 (South Korean Won)' },
        'CNY': { flag: '🇨🇳', name: '人民幣 (Chinese Yuan)' },
        'GBP': { flag: '🇬🇧', name: '英鎊 (British Pound)' },
        'AUD': { flag: '🇦🇺', name: '澳幣 (Australian Dollar)' },
        'CAD': { flag: '🇨🇦', name: '加幣 (Canadian Dollar)' },
        'HKD': { flag: '🇭🇰', name: '港幣 (Hong Kong Dollar)' },
        'SGD': { flag: '🇸🇬', name: '新加坡幣 (Singapore Dollar)' },
        'THB': { flag: '🇹🇭', name: '泰銖 (Thai Baht)' },
        'MYR': { flag: '🇲🇾', name: '馬來西亞令吉 (Malaysian Ringgit)' },
        'VND': { flag: '🇻🇳', name: '越南盾 (Vietnamese Dong)' },
        'PHP': { flag: '🇵🇭', name: '菲律賓披索 (Philippine Peso)' }
    };

    // 畫面上預設顯示的 5 個貨幣欄位
    let displaySlots = ['JPY', 'TWD', 'KRW', 'CNY', 'USD'];
    
    let exchangeRates = {};
    let activeCurrency = 'USD'; // 當前作為計算基準的貨幣
    let currentInput = '10';
    let changingSlotIndex = null; // 紀錄目前正在更改哪一個欄位的貨幣

    async function init() {
        renderCurrencies();
        buildModalList();
        await fetchRates();
        updateDisplay();
    }

    // 獲取最新 API 匯率數據
    async function fetchRates() {
        try {
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            
            if (data && data.rates) {
                exchangeRates = data.rates;
                const updateTime = new Date(data.time_last_update_unix * 1000);
                document.getElementById('last-update').innerText = 
                    `${updateTime.getFullYear()}/${(updateTime.getMonth()+1).toString().padStart(2, '0')}/${updateTime.getDate().toString().padStart(2, '0')} ${updateTime.getHours().toString().padStart(2, '0')}:${updateTime.getMinutes().toString().padStart(2, '0')} 更新`;
            }
        } catch (error) {
            console.error("無法取得匯率資料:", error);
            document.getElementById('last-update').innerText = "匯率更新失敗，請檢查網路狀態";
            document.getElementById('last-update').style.color = "#ff453a";
        }
    }

    // 渲染主畫面的 5 個貨幣欄位
    function renderCurrencies() {
        const listDiv = document.getElementById('currency-list');
        listDiv.innerHTML = '';

        displaySlots.forEach((code, index) => {
            const currency = allCurrencies[code];
            const row = document.createElement('div');
            row.className = `currency-row ${code === activeCurrency ? 'active' : ''}`;

            // 左側：點擊開啟更換貨幣選單 (使用 stopPropagation 防止觸發右側的切換輸入)
            const selectorDiv = document.createElement('div');
            selectorDiv.className = 'currency-selector';
            selectorDiv.onclick = (e) => {
                e.stopPropagation(); 
                openModal(index);
            };
            selectorDiv.innerHTML = `
                <div class="flag">${currency.flag}</div>
                <div class="code">${code}</div>
                <div class="dropdown-icon">▼</div>
            `;

            // 右側：點擊將該貨幣設為主動輸入狀態
            const amountContainer = document.createElement('div');
            amountContainer.className = 'amount-container';
            amountContainer.onclick = () => setActiveCurrency(code);
            amountContainer.innerHTML = `<div class="amount" id="amount-${code}">0</div>`;

            row.appendChild(selectorDiv);
            row.appendChild(amountContainer);
            listDiv.appendChild(row);
        });
    }

    // 設定當前基準貨幣
    function setActiveCurrency(code) {
        activeCurrency = code;
        currentInput = document.getElementById(`amount-${code}`).innerText.replace(/,/g, '');
        renderCurrencies();
        updateDisplay();
    }

    // --- 彈出選單 (Modal) 邏輯 ---

    function buildModalList() {
        const modalList = document.getElementById('modal-currency-list');
        modalList.innerHTML = '';
        
        for (const [code, info] of Object.entries(allCurrencies)) {
            const item = document.createElement('div');
            item.className = 'modal-currency-item';
            item.onclick = () => selectNewCurrency(code);
            item.innerHTML = `
                <div class="flag">${info.flag}</div>
                <div class="code">${code}</div>
                <div class="modal-currency-name">${info.name}</div>
            `;
            modalList.appendChild(item);
        }
    }

    function openModal(slotIndex) {
        changingSlotIndex = slotIndex;
        document.getElementById('currency-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('currency-modal').classList.remove('show');
        changingSlotIndex = null;
    }

    // 當使用者在選單中選了新貨幣
    function selectNewCurrency(newCode) {
        // 如果選到的貨幣剛好是正在計算的基準貨幣，就將基準轉移過去
        if (displaySlots[changingSlotIndex] === activeCurrency) {
            activeCurrency = newCode;
        }
        
        displaySlots[changingSlotIndex] = newCode; // 更新該欄位的貨幣代碼
        closeModal();
        renderCurrencies();
        updateDisplay();
    }

    // 點擊黑色半透明背景也能關閉選單
    document.getElementById('currency-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // --- 鍵盤與計算邏輯 ---

    function handleInput(key) {
        if (key === 'C') {
            currentInput = '0';
        } else if (key === 'BACK') {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
        } else if (key === '=') {
            try {
                let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                const result = new Function('return ' + expression)();
                currentInput = String(result);
            } catch (e) {
                currentInput = 'Error';
            }
        } else if (['+', '-', '*', '/', '%'].includes(key)) {
            const lastChar = currentInput.slice(-1);
            if (!['+', '-', '*', '/', '%', '.'].includes(lastChar)) {
                 currentInput += key === '*' ? '×' : key === '/' ? '÷' : key;
            }
        } else {
            if (currentInput === '0' && key !== '.') {
                currentInput = key;
            } else {
                currentInput += key;
            }
        }
        updateDisplay();
    }

    function updateDisplay() {
        const activeValue = parseFloat(currentInput);
        
        displaySlots.forEach(code => {
            const amountEl = document.getElementById(`amount-${code}`);
            if (!amountEl) return;

            if (code === activeCurrency) {
                amountEl.innerText = currentInput;
            } else {
                if (isNaN(activeValue) || !exchangeRates[code] || !exchangeRates[activeCurrency]) {
                    amountEl.innerText = '0';
                    return;
                }
                const rateToUSD = exchangeRates[code];
                const activeToUSD = exchangeRates[activeCurrency];
                const calculatedValue = (rateToUSD / activeToUSD) * activeValue;
                
                amountEl.innerText = formatNumber(calculatedValue);
            }
        });
    }

    function formatNumber(num) {
        return num.toLocaleString('en-US', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        });
    }

    init();
</script>
</body>
</html>
